name: Actualizar Noticias Medioambientales

on:
  # Corre automáticamente a las 8:00 AM hora de Chile (UTC-3 → 11:00 UTC)
  schedule:
    - cron: '0 11 * * *'

  # Permite ejecutar manualmente desde GitHub → Actions → Run workflow
  workflow_dispatch:

# Permiso para que el bot pueda hacer commit, push e issues
permissions:
  contents: write
  issues: write

jobs:
  actualizar-noticias:
    name: Scraping y clasificación
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Configurar Python 3.11
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      # 3. Instalar dependencias
      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # 4. Validar que GEMINI_API_KEY está configurada
      - name: Validar API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY no está configurada. El scraper mostrará todas las noticias sin filtro IA."
          else
            echo "GEMINI_API_KEY configurada correctamente."
          fi

      # 5. Ejecutar el scraper (con 1 reintento si falla)
      - name: Ejecutar scraper de noticias
        id: scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper/main.py || {
            echo "::warning::Primer intento falló, reintentando en 30s..."
            sleep 30
            python scraper/main.py
          }

      # 6. Verificar que el JSON de salida es válido
      - name: Verificar resultado
        id: verificar
        run: |
          python -c "
          import json, sys
          try:
              with open('data/noticias.json') as f:
                  d = json.load(f)
              total = d.get('total', 0)
              gemini = d.get('gemini_disponible', False)
              fecha = d.get('fecha_actualizacion', 'desconocida')
              print(f'Noticias relevantes: {total}')
              print(f'Gemini activo: {gemini}')
              print(f'Actualizado: {fecha}')
              if total == 0:
                  print('::warning::El scraper produjo 0 noticias relevantes.')
          except Exception as e:
              print(f'::error::noticias.json inválido o no existe: {e}')
              sys.exit(1)
          "

      # 7. Guardar los JSON actualizados en el repositorio
      - name: Guardar resultados en GitHub
        run: |
          git config --global user.name  "Monitor Medioambiental Bot"
          git config --global user.email "bot@noreply.github.com"
          git add data/noticias.json data/historial.json
          # Solo hace commit si hay cambios
          git diff --staged --quiet \
            || git commit -m "🌿 Noticias actualizadas $(date +'%Y-%m-%d %H:%M') UTC"
          git push

      # 8. Crear issue automático si el workflow falla
      - name: Notificar fallo
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Scraper falló el ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## El workflow de actualización de noticias falló',
              '',
              `**Fecha:** ${new Date().toISOString()}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Revisa los logs del workflow para más detalles.',
            ].join('\n');

            // Evitar crear issues duplicados si ya hay uno abierto
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scraper-error',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['scraper-error'],
              });
            }
