name: Actualizar Noticias Medioambientales

on:
  # Corre automáticamente a las 8:00 AM hora de Chile (UTC-3 → 11:00 UTC)
  schedule:
    - cron: '0 11 * * *'

  # Permite ejecutar manualmente desde GitHub → Actions → Run workflow
  workflow_dispatch:

# Permiso para que el bot pueda hacer commit y push de los JSON
permissions:
  contents: write

jobs:
  actualizar-noticias:
    name: Scraping y clasificación
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Configurar Python 3.11
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      # 3. Instalar dependencias
      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # 4. Ejecutar el scraper (usa el secret GEMINI_API_KEY)
      - name: Ejecutar scraper de noticias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper/main.py
        continue-on-error: false

      # 5. Mostrar resumen de resultados en el log
      - name: Mostrar resumen
        run: |
          echo "=== Resultado ==="
          python -c "
          import json
          with open('data/noticias.json') as f:
              d = json.load(f)
          print(f\"Noticias relevantes: {d['total']}\")
          print(f\"Actualizado: {d['fecha_actualizacion']}\")
          print(f\"Gemini activo: {d['gemini_disponible']}\")
          "

      # 6. Guardar los JSON actualizados en el repositorio
      - name: Guardar resultados en GitHub
        run: |
          git config --global user.name  "Monitor Medioambiental Bot"
          git config --global user.email "bot@noreply.github.com"
          git add data/noticias.json data/historial.json
          # Solo hace commit si hay cambios
          git diff --staged --quiet \
            || git commit -m "🌿 Noticias actualizadas $(date +'%Y-%m-%d %H:%M') UTC"
          git push
